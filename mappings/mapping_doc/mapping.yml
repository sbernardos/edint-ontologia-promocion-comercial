prefixes:
  ex: "https://example.org/id/"
  edintpro: "http://vocab.linkeddata.es/datosabiertos/def/comercio/promocion#"
  edintcom: "http://vocab.linkeddata.es/datosabiertos/def/comercio/censo-locales#"
  edintzone: "http://vocab.linkeddata.es/datosabiertos/def/common/zone#"
  schema: "http://schema.org/"
  dcterms: "http://purl.org/dc/terms/"
  geosparql: "http://www.opengis.net/ont/geosparql#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  edintkoacctype: "http://vocab.linkeddata.es/datosabiertos/kos/edint/CommercialEventType/"
  edintkoaccCamtype: "http://vocab.linkeddata.es/datosabiertos/kos/edint/CommercialCampaignType/"

sources:
  promociones: ['promocion_comercial.csv~csv']

mappings:

  eventoComercial:
    sources:
      - promociones
    s: http://vocab.linkeddata.es/datosabiertos/recurso/evento-comercial/$(evento_id)
    po:
      - [a, edintcom:CommercialEvent ]
      - [dcterms:identifier, $(evento_id) ]
      - [rdfs:label, $(nombre) ]
      - [rdfs:comment, $(descripcion) ]
      - [edintcom:hasCommercialEventType, "http://vocab.linkeddata.es/datosabiertos/kos/edint/CommercialEventType/$(tipo_event)~iri" ]
      - [edintcom:locatedInZone, "http://vocab.linkeddata.es/datosabiertos/recurso/zona/$(zona_id)~iri"]
      - [schema:startDate, $(fecha_inicio), xsd:dateTime ]
      - [schema:endDate, $(fecha_fin), xsd:dateTime ]
  zona:
    sources:
      - promociones
    s: http://vocab.linkeddata.es/datosabiertos/recurso/zona/$(zona_id)
    po:
      - [a, edintzone:EconomicInterestZone]
      - [dcterms:identifier, $(zona_id)]
      - [rdfs:label, $(nombre_zona)]
      - [rdfs:comment, $(descripcion_zona)]
      - [geosparql:hasGeometry, "http://vocab.linkeddata.es/datosabiertos/recurso/zona/geometry/$(zona_id)~iri"]

  campania_comercial:
    sources:
      - promociones
    s: http://vocab.linkeddata.es/datosabiertos/recurso/campania-comercial/$(campania_id)
    po:
      - [a, edintcom:CommercialCampaign]
      - [dcterms:identifier, $(campania_id)]
      - [rdfs:label, $(nombre)]
      - [rdfs:comment, $(descripcion)]
      - [edintcom:locatedInZone, "http://vocab.linkeddata.es/datosabiertos/recurso/zona/$(zona_id)~iri"]
      - [edintcom:includes, "http://vocab.linkeddata.es/datosabiertos/recurso/espacioComercial/$(espacioComercial_id)~iri"]
      - [schema:startDate, $(fecha_inicio), xsd:dateTime]
      - [schema:endDate, $(fecha_fin), xsd:dateTime]
      - [edintpro:hasCommercialCampaignType, "http://vocab.linkeddata.es/datosabiertos/kos/edint/CommercialCampaignType/$(tipo_campania)~iri"]

  espacioComercial:
    sources:
      - promociones
    s: http://vocab.linkeddata.es/datosabiertos/recurso/espacioComercial/$(espacioComercial_id)
    po:
      - [a, edintcom:CommercialSpace]
      - [edintcom:locatedInZone, "http://vocab.linkeddata.es/datosabiertos/recurso/zona/$(zona_id)~iri"]